<!DOCTYPE html>
<html>
<head>
    <title>Simple Test Page</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h1>Quant Trading System - Simple Test</h1>
    <p>Server Time: <span id="time">Loading...</span></p>
    
    <div class="status" id="web-status">
        <h3>Web Server Test</h3>
        <p>If you can see this page, the web server is working.</p>
    </div>
    
    <div class="status" id="api-status">
        <h3>API Server Test</h3>
        <p id="api-result">Testing API connection...</p>
    </div>
    
    <script>
        // Update time
        document.getElementById('time').textContent = new Date().toLocaleString();
        
        // Test API connection
        fetch('http://76.13.108.193:8001/health')
            .then(response => response.json())
            .then(data => {
                document.getElementById('api-result').textContent = 
                    `API Status: ${data.status}, Version: ${data.version}`;
                document.getElementById('api-status').className = 'status success';
            })
            .catch(error => {
                document.getElementById('api-result').textContent = 
                    `API Error: ${error.message}`;
                document.getElementById('api-status').className = 'status error';
            });
    </script>
</body>
</html>
