<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quant Trading Charts - Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        label {
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        select, input, button {
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            transition: all 0.3s ease;
        }
        
        select:focus, input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.5);
        }
        
        button {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .charts-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }
        
        .chart-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .chart-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .chart-title {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .chart-info {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .chart-image {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chart-image img {
            max-width: 100%;
            max-height: 500px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .loading {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            padding: 40px;
        }
        
        .status-bar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            z-index: 1000;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .controls {
                grid-template-columns: 1fr;
            }
            
            .chart-image {
                min-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 量化交易策略图表</h1>
            <p>实时可视化展示双均线交叉策略效果 - 支持动态参数调整</p>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label for="symbol">股票代码</label>
                <select id="symbol">
                    <option value="SPY">SPY (标普500 ETF)</option>
                    <option value="AAPL" selected>AAPL (苹果)</option>
                    <option value="MSFT">MSFT (微软)</option>
                    <option value="GOOGL">GOOGL (谷歌)</option>
                    <option value="AMZN">AMZN (亚马逊)</option>
                    <option value="TSLA">TSLA (特斯拉)</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="period">时间周期</label>
                <select id="period">
                    <option value="1mo">1个月</option>
                    <option value="3mo" selected>3个月</option>
                    <option value="6mo">6个月</option>
                    <option value="1y">1年</option>
                    <option value="2y">2年</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="fastPeriod">快线周期 (日)</label>
                <input type="number" id="fastPeriod" value="10" min="5" max="50">
            </div>
            
            <div class="control-group">
                <label for="slowPeriod">慢线周期 (日)</label>
                <input type="number" id="slowPeriod" value="30" min="20" max="100">
            </div>
            
            <div class="control-group">
                <label>&nbsp;</label>
                <button onclick="loadAllCharts()">🚀 生成所有图表</button>
            </div>
        </div>
        
        <div class="charts-container">
            <div class="chart-card">
                <div class="chart-header">
                    <div class="chart-title">📊 价格走势图</div>
                    <div class="chart-info" id="priceInfo">点击生成查看</div>
                </div>
                <div class="chart-image" id="priceChart">
                    <div class="loading">等待生成价格图表...</div>
                </div>
            </div>
            
            <div class="chart-card">
                <div class="chart-header">
                    <div class="chart-title">🎯 策略信号图</div>
                    <div class="chart-info" id="strategyInfo">点击生成查看</div>
                </div>
                <div class="chart-image" id="strategyChart">
                    <div class="loading">等待生成策略图表...</div>
                </div>
            </div>
            
            <div class="chart-card">
                <div class="chart-header">
                    <div class="chart-title">📈 回测结果图</div>
                    <div class="chart-info" id="backtestInfo">点击生成查看</div>
                </div>
                <div class="chart-image" id="backtestChart">
                    <div class="loading">等待生成回测图表...</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="status-bar" id="statusBar">就绪</div>
    
    <script>
        const API_BASE = 'http://76.13.108.193:8000';
        
        function updateStatus(message) {
            const statusBar = document.getElementById('statusBar');
            statusBar.textContent = message;
            console.log(message);
        }
        
        function showLoading(chartId, message) {
            const chartDiv = document.getElementById(chartId);
            chartDiv.innerHTML = `<div class="loading">${message}</div>`;
        }
        
        function displayChart(chartId, imageBase64, infoId, infoText) {
            const chartDiv = document.getElementById(chartId);
            const infoDiv = document.getElementById(infoId);
            
            chartDiv.innerHTML = `<img src="data:image/png;base64,${imageBase64}" alt="Chart">`;
            infoDiv.textContent = infoText;
        }
        
        async function loadPriceChart() {
            const symbol = document.getElementById('symbol').value;
            const period = document.getElementById('period').value;
            
            showLoading('priceChart', '正在加载价格图表...');
            updateStatus(`正在获取 ${symbol} 价格数据...`);
            
            try {
                const response = await fetch(`${API_BASE}/api/v1/charts/price?symbol=${symbol}&period=${period}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                
                if (data.image_base64) {
                    const infoText = `${symbol} | ${period} | ${data.data_points}个数据点`;
                    displayChart('priceChart', data.image_base64, 'priceInfo', infoText);
                    updateStatus(`✅ ${symbol} 价格图表加载成功`);
                } else {
                    throw new Error('图表数据无效');
                }
            } catch (error) {
                document.getElementById('priceChart').innerHTML = 
                    `<div class="loading" style="color: #ff6b6b;">❌ 加载失败: ${error.message}</div>`;
                updateStatus(`❌ 价格图表加载失败: ${error.message}`);
            }
        }
        
        async function loadStrategyChart() {
            const symbol = document.getElementById('symbol').value;
            const period = document.getElementById('period').value;
            const fastPeriod = document.getElementById('fastPeriod').value;
            const slowPeriod = document.getElementById('slowPeriod').value;
            
            showLoading('strategyChart', '正在生成策略图表...');
            updateStatus(`正在分析 ${symbol} 策略信号...`);
            
            try {
                const response = await fetch(
                    `${API_BASE}/api/v1/charts/strategy?` +
                    `symbol=${symbol}&period=${period}&fast_period=${fastPeriod}&slow_period=${slowPeriod}`
                );
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                
                if (data.image_base64) {
                    const infoText = `${symbol} | ${fastPeriod}/${slowPeriod}日均线 | ${data.signals.total_signals}个信号`;
                    displayChart('strategyChart', data.image_base64, 'strategyInfo', infoText);
                    updateStatus(`✅ ${symbol} 策略图表加载成功`);
                } else {
                    throw new Error('策略图表数据无效');
                }
            } catch (error) {
                document.getElementById('strategyChart').innerHTML = 
                    `<div class="loading" style="color: #ff6b6b;">❌ 加载失败: ${error.message}</div>`;
                updateStatus(`❌ 策略图表加载失败: ${error.message}`);
            }
        }
        
        async function loadBacktestChart() {
            const symbol = document.getElementById('symbol').value;
            const period = document.getElementById('period').value;
            
            showLoading('backtestChart', '正在计算回测结果...');
            updateStatus(`正在回测 ${symbol} 策略表现...`);
            
            try {
                const response = await fetch(
                    `${API_BASE}/api/v1/charts/backtest?symbol=${symbol}&period=${period}`
                );
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                
                if (data.image_base64) {
                    const marketReturn = (data.performance.market_return * 100).toFixed(1);
                    const strategyReturn = (data.performance.strategy_return * 100).toFixed(1);
                    const infoText = `${symbol} | 市场: ${marketReturn}% | 策略: ${strategyReturn}%`;
                    
                    displayChart('backtestChart', data.image_base64, 'backtestInfo', infoText);
                    updateStatus(`✅ ${symbol} 回测图表加载成功`);
                } else {
                    throw new Error('回测图表数据无效');
                }
            } catch (error) {
                document.getElementById('backtestChart').innerHTML = 
                    `<div class="loading" style="color: #ff6b6b;">❌ 加载失败: ${error.message}</div>`;
                updateStatus(`❌ 回测图表加载失败: ${error.message}`);
            }
        }
        
        async function loadAllCharts() {
            updateStatus('开始生成所有图表...');
            
            // 依次加载三个图表
            await loadPriceChart();
            await loadStrategyChart();
            await loadBacktestChart();
            
            updateStatus('所有图表生成完成！');
        }
        
        // 页面加载时自动生成AAPL的图表
        window.onload = function() {
            updateStatus('页面加载完成，点击"生成所有图表"开始');
        };
        
        // 添加键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                loadAllCharts();
            }
        });
    </script>
</body>
</html>
